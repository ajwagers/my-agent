# Policy Engine Configuration
# Zone rules, rate limits, approval settings, external service rules.
# Mounted read-only into the container. Agent CANNOT modify this file.

zones:
  sandbox:
    path: /sandbox
    read: allow
    write: allow
    execute: allow

  identity:
    path: /agent
    read: allow
    write: requires_approval
    execute: deny

  system:
    path: /app
    read: allow
    write: deny
    execute: deny

  external:
    # Governed by check_http_access rules below
    read: allow
    write: requires_approval

rate_limits:
  default:
    max_calls: 30
    window_seconds: 60
  rag_ingest:
    max_calls: 10
    window_seconds: 60
  rag_search:
    max_calls: 20
    window_seconds: 60
  web_search:
    max_calls: 10
    window_seconds: 60
  code_exec:
    max_calls: 20
    window_seconds: 60
  file_write:
    max_calls: 15
    window_seconds: 60
  file_read:
    max_calls: 20
    window_seconds: 60
  url_fetch:
    max_calls: 10
    window_seconds: 60
  pdf_parse:
    max_calls: 10
    window_seconds: 60
  remember:
    max_calls: 15
    window_seconds: 60
  recall:
    max_calls: 20
    window_seconds: 60
  create_task:
    max_calls: 5
    window_seconds: 60
  list_tasks:
    max_calls: 20
    window_seconds: 60
  cancel_task:
    max_calls: 10
    window_seconds: 60
  calculate:
    max_calls: 50
    window_seconds: 60
  convert_units:
    max_calls: 50
    window_seconds: 60
  python_exec:
    max_calls: 10
    window_seconds: 60
  calendar_read:
    max_calls: 20
    window_seconds: 60
  calendar_write:
    max_calls: 5
    window_seconds: 60
  memory_capture:
    max_calls: 20
    window_seconds: 60
  memory_search:
    max_calls: 20
    window_seconds: 60
  sp_inventory:
    max_calls: 20
    window_seconds: 60
  sp_orders:
    max_calls: 20
    window_seconds: 60
  sp_faq:
    max_calls: 30
    window_seconds: 60
  sp_costs:
    max_calls: 20
    window_seconds: 60
  sp_time_log:
    max_calls: 20
    window_seconds: 60
  sp_recipes:
    max_calls: 20
    window_seconds: 60
  sp_promotions:
    max_calls: 20
    window_seconds: 60
  shell_exec:
    max_calls: 5
    window_seconds: 60
  github:
    max_calls: 10
    window_seconds: 60

max_tool_iterations: 5  # operator-tunable hard cap on tool-calling rounds per request

approval:
  timeout_seconds: 300  # 5 minutes, then auto-deny
  redis_prefix: "approval"
  pubsub_channel: "approvals:pending"

external_access:
  http_get: allow
  http_post: requires_approval
  http_put: requires_approval
  http_delete: requires_approval

  denied_url_patterns:
    - ".*paypal\\.com.*"
    - ".*stripe\\.com/v1/charges.*"
    - ".*bank.*\\.com.*"
    - ".*signup.*"
    - ".*register.*"
    - ".*billing.*"
