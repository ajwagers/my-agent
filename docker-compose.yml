services:
  ollama-runner:
    image: ollama/ollama:latest
    container_name: ollama-runner
    networks:
      - agent_net
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart:
        unless-stopped

  postgres-brain:
    image: pgvector/pgvector:pg16
    container_name: postgres-brain
    networks:
      - agent_net
    environment:
      - POSTGRES_DB=brain
      - POSTGRES_USER=brain
      - POSTGRES_PASSWORD=${BRAIN_POSTGRES_PASSWORD}
    volumes:
      - brain_data:/var/lib/postgresql/data
    restart: unless-stopped

  open-brain-mcp:
    build: ./open-brain-mcp
    container_name: open-brain-mcp
    networks:
      - agent_net
    depends_on:
      postgres-brain:
        condition: service_started
      ollama-runner:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://brain:${BRAIN_POSTGRES_PASSWORD}@postgres-brain:5432/brain
      - OLLAMA_HOST=http://ollama-runner:11434
      - EMBED_MODEL=nomic-embed-text
      - LLM_MODEL=gemma4:e4b
      - MS_GRAPH_CLIENT_ID=${MS_GRAPH_CLIENT_ID}
    volumes:
      - ./agent-identity:/agent:ro
    ports:
      - "127.0.0.1:8002:8002"
    restart: unless-stopped

  shell-exec:
    build: ./shell-exec
    container_name: shell-exec
    networks:
      - shell_exec_net    # internal-only: no internet access
    volumes:
      - agent_sandbox:/sandbox
    cap_drop:
      - ALL
    cap_add:
      - SETUID             # needed to drop to 'runner' user via subprocess user= param
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  github-gateway:
    build: ./github-gateway
    container_name: github-gateway
    networks:
      - agent_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32m
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ALLOW_REPOS=${GITHUB_ALLOW_REPOS}
    restart: unless-stopped

  agent-core:
    build: ./agent-core
    container_name: agent-core
    stdin_open: true
    tty: true
    networks:
      - agent_net
      - shell_exec_net    # can reach shell-exec but shell-exec cannot reach internet
    depends_on:
      ollama-runner:
        condition: service_healthy
      redis:
        condition: service_started
      open-brain-mcp:
        condition: service_started
      shell-exec:
        condition: service_started
      github-gateway:
        condition: service_started
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - AGENT_API_KEY=${AGENT_API_KEY}
      - DEFAULT_MODEL=phi4-mini:latest
      - REASONING_MODEL=gemma4:e4b
      - BOOTSTRAP_MODEL=mistral:latest
      - DEEP_MODEL=qwen2.5:14b
      - DEEP_NUM_CTX=32768
      - NUM_CTX=32768
      - TOOL_MODEL=gemma4:e4b
      - CODING_MODEL=gemma4:e4b
      - EMBED_MODEL=nomic-embed-text
      - OLLAMA_HOST=http://ollama-runner:11434
      - WATCH_MODEL=qwen3.5:35b-a3b
      - MAX_TOOL_ITERATIONS=5
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
      - MS_GRAPH_CLIENT_ID=${MS_GRAPH_CLIENT_ID}
      - BRAIN_URL=http://open-brain-mcp:8002
      - SHELL_EXEC_URL=http://shell-exec:9001
      - GITHUB_GW_URL=http://github-gateway:9002
      - GITHUB_ALLOW_REPOS=${GITHUB_ALLOW_REPOS}
    volumes:
      - ./agent-core/policy.yaml:/app/policy.yaml:ro
      - agent_sandbox:/sandbox
      - ./agent-identity:/agent
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f --max-time 30 http://localhost:8000/health || exit 1"]
      interval: 60s
      timeout: 35s
      retries: 5
      start_period: 90s       # Ollama boot time
    restart:
        unless-stopped

  telegram-gateway:
    build: ./telegram-gateway
    container_name: telegram-gateway
    networks:
      - agent_net
    depends_on:
      agent-core:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - AGENT_API_KEY=${AGENT_API_KEY}
    env_file:
      - .env
    restart: unless-stopped

  chroma-rag:
    image: chromadb/chroma:latest
    container_name: chroma-rag
    networks:
      - agent_net
    ports:
      - "8100:8000"  # Chroma UI
    volumes:
      - chroma_data:/chroma/chroma
    command: ["run", "--host", "0.0.0.0", "--port", "8000"]
    restart: 
        unless-stopped

  web-ui:
    build: ./web-ui
    container_name: web-ui
    networks:
      - agent_net
    ports:
      - "8501:8501"
    depends_on: 
      - agent-core
      - chroma-rag
    environment:
      - AGENT_URL=http://agent-core:8000
      - AGENT_API_KEY=${AGENT_API_KEY}
      - CHROMA_URL=http://chroma-rag:8000
      - OLLAMA_HOST=http://ollama-runner:11434
      - EMBED_MODEL=nomic-embed-text
      - BOOTSTRAP_MODEL=mistral:latest
      - NUM_CTX=32768
    restart: 
        unless-stopped

  dashboard:
    build: ./dashboard
    container_name: dashboard
    networks:
      - agent_net
    ports:
      - "8502:8502"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    restart: unless-stopped

  calendar-ui:
    build: ./calendar-ui
    container_name: calendar-ui
    networks:
      - agent_net
    ports:
      - "8503:8503"
    volumes:
      - ./agent-identity:/agent
    environment:
      - MS_GRAPH_CLIENT_ID=${MS_GRAPH_CLIENT_ID}
    restart: unless-stopped

  summit-pine-ui:
    build: ./summit-pine-ui
    container_name: summit-pine-ui
    networks:
      - agent_net
    depends_on:
      postgres-brain:
        condition: service_started
    ports:
      - "8504:8504"
    environment:
      - SUMMIT_PINE_DB_URL=postgresql://sp_app:summit_pine_app@postgres-brain:5432/brain
      - AGENT_URL=http://agent-core:8000
      - AGENT_API_KEY=${AGENT_API_KEY}
    restart: unless-stopped

  redis:
    image: redis:alpine
    networks:
      - agent_net
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - agent_net
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - agent_net
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    depends_on:
      - prometheus
    restart: unless-stopped

  mumble-server:
    image: mumblevoip/mumble-server:latest
    container_name: mumble-server
    networks:
      - agent_net
    volumes:
      - mumble_data:/data
    environment:
      - MUMBLE_SUPERUSER_PASSWORD=${MUMBLE_SUPERUSER_PASSWORD}
    ports:
      - "64738:64738"        # TCP (control channel)
      - "64738:64738/udp"    # UDP (voice traffic)
    restart: unless-stopped

  mumble-bot:
    build: ./mumble-bot
    container_name: mumble-bot
    networks:
      - agent_net
    depends_on:
      agent-core:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - MUMBLE_HOST=mumble-server
      - MUMBLE_PORT=64738
      - MUMBLE_PASSWORD=${MUMBLE_SERVER_PASSWORD}
      - MUMBLE_BOT_NAME=Agent
      - MUMBLE_CHANNEL=Root
      - AGENT_URL=http://agent-core:8000
      - AGENT_API_KEY=${AGENT_API_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - BRAIN_URL=http://open-brain-mcp:8002
      - MUMBLE_OWNER_USERNAMES=${MUMBLE_OWNER_USERNAMES:-Andy}
      - MUMBLE_OWNER_CERT_HASH=${MUMBLE_OWNER_CERT_HASH:-}
    restart: unless-stopped

networks:
  agent_net:
    driver: bridge
  shell_exec_net:
    driver: bridge
    internal: true    # no internet access — shell commands cannot exfiltrate data

volumes:
  ollama_data:
  chroma_data:
  agent_sandbox:
  mumble_data:
  brain_data:
  prometheus_data:
  grafana_data:

